version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: artgenesis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: artgenesis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artgenesis-network

  redis:
    image: redis:7-alpine
    container_name: artgenesis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - artgenesis-network

volumes:
  postgres_data:
  redis_data:

networks:
  artgenesis-network:
    driver: bridge
