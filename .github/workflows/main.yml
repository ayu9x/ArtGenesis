name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Compile Smart Contracts
      run: npm run build --workspace=@artgenesis/contracts
      
    - name: Test Smart Contracts
      run: npm run test --workspace=@artgenesis/contracts
      
    - name: Build Web App
      run: npm run build --workspace=@artgenesis/web
      
    - name: Build API
      run: npm run build --workspace=@artgenesis/api
